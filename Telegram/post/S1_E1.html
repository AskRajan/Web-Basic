<!DOCTYPE html>
<html lang="en">
<head>

    <title>Telegram App</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .container {
            display: flex;
            justify-content: center;
        }
    </style>
<body>
    <div class="container">

                <p>💿 Quality - 480p, 720p, 1080p</p>

                <div class="btnDown">
                    <a class="btn-1" href="https://failureframe.fastrush.online/" target="_blank">Go Home</a>
                    <a class="btn-1" href="/" target="_blank">Episode 2</a>
                </div>
            </div>

        </div>
        <div class="footer">
            <a href="/" id="footerJoin">Join Now</a>
        </div>
    </div>
    <script src="..script.js"></script>

</html>
